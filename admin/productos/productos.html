<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | Meier ERP</title>

    <link rel="stylesheet" href="../admin.css">
    <link rel="stylesheet" href="productos.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logoPanel">
            <h2>MEIER</h2>
            <p>ERP SISTEMA</p>
        </div>

        <nav>
            <a href="../dashboard.html">🏠 Dashboard</a>
            <a href="productos.html">📦 Productos</a>
            <a href="../ventas/ventas.html">🛒 Ventas</a>
            <a href="../compras.html">🚚 Compras</a>
            <a href="../clientes/clientes.html">👥 Clientes</a>
            <a href="../reportes.html">📈 Reportes</a>
            <a href="../estadisticas/estadisticas.html">📊 Estadísticas</a>
        </nav>

        <button id="logout">Cerrar sesión</button>

    </aside>

    <main>

        <h1>📦 Productos</h1>

        <!-- RESUMEN -->
        <div class="cards">

            <div class="card">
                <h3>Total productos</h3>
                <h2 id="productosCount">0</h2>
            </div>

            <div class="card">
                <h3>Stock total</h3>
                <h2 id="stockTotal">0</h2>
            </div>

        </div>

        <!-- FORM -->
        <section>
            <h2>Nuevo producto</h2>

            <form id="productoForm">

                <input type="text" id="prodNombre" placeholder="Nombre" required>

                <input type="text" id="prodMarca" placeholder="Marca">

                <input type="text" id="prodCategoria" placeholder="Categoría">

                <input type="number" id="prodPrecio" placeholder="Precio" min="0" step="0.01" required>

                <input type="number" id="prodStock" placeholder="Stock inicial" min="0" required>

                <textarea id="prodDescripcion" placeholder="Descripción"></textarea>

                <button type="submit">Guardar producto</button>

            </form>
        </section>

        <!-- LISTA -->
        <section>
            <h2>Listado de productos</h2>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Marca</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acción</th>
                        </tr>
                    </thead>

                    <tbody id="productosTable">
                        <tr>
                            <td colspan="6" style="padding:18px;text-align:center;color:#6b7280;">
                                No hay productos registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </main>

</div>

<script src="productos.js"></script>

    <script src="../admin-ui.js"></script>
</body>
</html>
