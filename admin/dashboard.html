<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PRO | Meier ERP</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="erp">

    <!-- SIDEBAR (igual al tuyo) -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logoPanel">
                <h2>MEIER</h2>
                <p>ERP PRO</p>
            </div>

            <nav>
                <a href="dashboard.html" class="active">🏠 Dashboard</a>
                <a href="ventas/ventas.html">🛒 Ventas</a>
                <a href="productos/productos.html">📦 Productos</a>
                <a href="clientes/clientes.html">👥 Clientes</a>
                <a href="proveedores/proveedores.html">🏢 Proveedores</a>
                <a href="compras/compras.html">🚚 Compras</a>
                <a href="stock/stock.html">📦 Stock</a>
                <a href="gastos/gastos.html">💰 Gastos</a>
                <a href="reportes.html">📈 Reportes</a>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <button id="logout">Cerrar sesión</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main>

        <header class="header">
            <button class="menu-toggle" type="button" aria-label="Abrir menú de navegación" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <h1>Dashboard PRO</h1>
            <span id="fechaActual"></span>
        </header>

        <div class="content">

            <!-- KPI -->
            <section class="dashboard-grid">

                <div class="kpi-card"><div class="kpi-title">Ventas Hoy</div><div class="kpi-value" id="ventasHoy">0</div></div>
                <div class="kpi-card"><div class="kpi-title">Ventas Mes</div><div class="kpi-value" id="ventasMes">0</div></div>
                <div class="kpi-card"><div class="kpi-title">Ganancia Est.</div><div class="kpi-value" id="ganancia">0</div></div>
                <div class="kpi-card"><div class="kpi-title">Productos</div><div class="kpi-value" id="productos">0</div></div>
                <div class="kpi-card"><div class="kpi-title">Clientes</div><div class="kpi-value" id="clientes">0</div></div>
                <div class="kpi-card"><div class="kpi-title">Stock Bajo</div><div class="kpi-value" id="stockBajo">0</div></div>

            </section>

            <!-- CHART + TOP -->
            <section class="card">

                <div class="grid" style="grid-template-columns:2fr 1fr;gap:20px;">

                    <div>
                        <h3>📊 Ventas (últimos días)</h3>
                        <canvas id="chartVentas"></canvas>
                    </div>

                    <div>
                        <h3>🏆 Top productos</h3>
                        <ul id="topProductos"></ul>
                    </div>

                </div>

            </section>

            <!-- ACTIVIDAD -->
            <section class="card mt30">

                <h3>📌 Últimas ventas</h3>
                <div id="ultimasVentas"></div>

            </section>

        </div>

    </main>

</div>

<script src="dashboard.js"></script>
<script src="admin-ui.js"></script>

</body>
</html>
